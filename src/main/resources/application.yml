spring:
  application:
    name: healthy-lifestyle-assistant
  datasource:
    url: jdbc:h2:file:./data/hla-db;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  ontology:
    path: classpath:ontology/healthy_lifestyle.owl
  jade:
    host: localhost
    port: 1099
    agents:
      coordinator: coordinator
      nutrition: nutrition-agent
      fitness: fitness-agent
      gateway: gateway-agent

logging:
  level:
    bg.pu.hla: INFO
    jade: WARN
